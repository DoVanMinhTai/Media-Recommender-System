spring.application.name=movie-recommendation

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000

spring.data.elasticsearch.repositories.enabled=true
spring.elasticsearch.uris=${ES_URL}
spring.elasticsearch.username=${ES_USERNAME}
spring.elasticsearch.password=${ES_PASSWORD}
spring.elasticsearch.connection-timeout=10s
spring.elasticsearch.socket-timeout=60s
spring.elasticsearch.rest-client.headers.Accept=application/vnd.elasticsearch+json;compatible-with=7
spring.elasticsearch.rest-client.headers.Content-Type=application/vnd.elasticsearch+json;compatible-with=7

logging.level.root=INFO
logging.level.nlu.fit.movie_backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true

management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true

management.metrics.tags.application=movie-recommender-system
management.metrics.tags.environment=production

management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,2s

services.chatbot=${CHATBOT_URL}
services.recommendation=${RECO_URL}
services.hfToken=${HF_TOKEN}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

logging.level.org.springframework.security=DEBUG